name: CI Avanzado - Contraseñas Seguras

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14-dev"]

    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python ${{ matrix.python-version }} 
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov flake8 bandit
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Linting con Flake8 (Calidad de Código)
      run: |
        # Detener el build si hay errores de sintaxis o variables no definidas
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Advertencias de estilo (máximo 127 caracteres por línea)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Análisis de Seguridad con Bandit
      run: |
        # Revisa vulnerabilidades comunes en Python
        bandit -r src/ -ll
    
    - name: Limpiar caché de Pytest
      run: rm -rf .pytest_cache

    - name: Ejecutar pruebas y Cobertura con Pytest-Cov
      run: |
        # Ejecuta tests y genera reporte de qué porcentaje de código se probó
        pytest --cov=src --cov-report=term-missing