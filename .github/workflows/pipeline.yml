name: CI de Contraseñas Seguras

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      # La matriz permite que el pipeline corra en paralelo para cada versión
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14-dev"]

    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python ${{ matrix.python-version }} 
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        # Esto permite que si la 3.14 falla por ser experimental, el resto siga
        allow-prereleases: true

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest  # Asegura que pytest esté instalado para los tests

    - name: Ejecutar pruebas con Pytest
      run: |
        pytest